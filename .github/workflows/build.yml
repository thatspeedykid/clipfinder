name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install NSIS
        run: choco install nsis --yes
        shell: cmd

      - name: Get version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update version in NSIS script
        run: |
          $ver = "${{ steps.version.outputs.VER }}"
          $nsi = Get-Content ClipFinder.nsi -Raw
          $nsi = $nsi -replace '!define APP_VERSION "\d+\.\d+(\.\d+(\.\d+)?)?"', "!define APP_VERSION `"$ver`""
          Set-Content ClipFinder.nsi $nsi
        shell: pwsh

      - name: Build base installer (embedded python + launcher)
        run: build_installer.bat
        shell: cmd

      - name: Pre-install torch CPU into pkgs
        run: |
          echo Installing torch CPU wheels...
          ClipFinder_dist\python\python.exe -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --target ClipFinder_dist\pkgs --quiet --no-warn-script-location
          echo torch done
        shell: cmd
        timeout-minutes: 40

      - name: Pre-install faster-whisper into pkgs
        run: |
          echo Installing faster-whisper...
          ClipFinder_dist\python\python.exe -m pip install faster-whisper --target ClipFinder_dist\pkgs --quiet --no-warn-script-location
          echo faster-whisper done
        shell: cmd
        timeout-minutes: 10

      - name: Pre-install openai-whisper into pkgs
        run: |
          echo Installing openai-whisper...
          ClipFinder_dist\python\python.exe -m pip install openai-whisper --target ClipFinder_dist\pkgs --quiet --no-warn-script-location
          echo openai-whisper done
        shell: cmd
        timeout-minutes: 10

      - name: Pre-install demucs into pkgs
        run: |
          echo Installing demucs...
          ClipFinder_dist\python\python.exe -m pip install demucs --target ClipFinder_dist\pkgs --quiet --no-warn-script-location
          echo demucs done
        shell: cmd
        timeout-minutes: 15

      - name: Check pkgs size
        run: |
          $size = (Get-ChildItem -Recurse ClipFinder_dist\pkgs | Measure-Object -Property Length -Sum).Sum
          $mb = [math]::Round($size / 1MB, 1)
          echo "pkgs folder size: $mb MB"
          Get-ChildItem ClipFinder_dist\pkgs | Select-Object Name | Format-Table
        shell: pwsh

      - name: Compile NSIS installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" ClipFinder.nsi
        shell: pwsh

      - name: Check installer size
        run: |
          $size = (Get-Item ClipFinder-Setup.exe).Length
          $mb = [math]::Round($size / 1MB, 1)
          echo "ClipFinder-Setup.exe size: $mb MB"
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipFinder v${{ steps.version.outputs.VER }}
          body_path: RELEASE_NOTES_v${{ steps.version.outputs.VER }}.md
          files: ClipFinder-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

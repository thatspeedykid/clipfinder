name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install NSIS
        run: choco install nsis --yes
        shell: cmd

      - name: Get version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update version in NSIS script
        run: |
          $ver = "${{ steps.version.outputs.VER }}"
          $nsi = Get-Content ClipFinder.nsi -Raw
          $nsi = $nsi -replace '!define APP_VERSION "\d+\.\d+(\.\d+(\.\d+)?)?"', "!define APP_VERSION `"$ver`""
          Set-Content ClipFinder.nsi $nsi
        shell: pwsh

      - name: Build base (embedded python + launcher + app files)
        run: build_installer.bat
        shell: cmd

      - name: Verify embedded python works
        run: |
          ClipFinder_dist\python\python.exe --version
          ClipFinder_dist\python\python.exe -m pip --version
        shell: cmd

      - name: Pre-install torch CPU
        run: |
          ClipFinder_dist\python\python.exe -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --target ClipFinder_dist\pkgs --no-warn-script-location
          echo torch exit code: %errorlevel%
        shell: cmd
        timeout-minutes: 45

      - name: Pre-install faster-whisper
        run: |
          ClipFinder_dist\python\python.exe -m pip install faster-whisper --target ClipFinder_dist\pkgs --no-warn-script-location
          echo faster-whisper exit code: %errorlevel%
        shell: cmd
        timeout-minutes: 10

      - name: Pre-install openai-whisper
        run: |
          ClipFinder_dist\python\python.exe -m pip install openai-whisper --target ClipFinder_dist\pkgs --no-warn-script-location
          echo openai-whisper exit code: %errorlevel%
        shell: cmd
        timeout-minutes: 10

      - name: Pre-install demucs
        run: |
          ClipFinder_dist\python\python.exe -m pip install demucs --target ClipFinder_dist\pkgs --no-warn-script-location
          echo demucs exit code: %errorlevel%
        shell: cmd
        timeout-minutes: 15

      - name: Verify pkgs folder
        run: |
          $items = Get-ChildItem ClipFinder_dist\pkgs -ErrorAction SilentlyContinue
          if ($items) {
            $size = (Get-ChildItem -Recurse ClipFinder_dist\pkgs | Measure-Object -Property Length -Sum).Sum
            $mb = [math]::Round($size / 1MB, 1)
            echo "SUCCESS: pkgs folder has $($items.Count) items, total $mb MB"
            $items | Select-Object -First 20 Name | Format-Table
          } else {
            echo "ERROR: pkgs folder is empty or missing!"
            exit 1
          }
        shell: pwsh

      - name: Compile NSIS installer
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" ClipFinder.nsi'
        shell: pwsh

      - name: Verify installer size
        run: |
          $size = (Get-Item ClipFinder-Setup.exe).Length
          $mb = [math]::Round($size / 1MB, 1)
          echo "ClipFinder-Setup.exe: $mb MB"
          if ($mb -lt 500) {
            echo "WARNING: Installer seems too small — packages may not be bundled"
          }
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipFinder v${{ steps.version.outputs.VER }}
          body_path: RELEASE_NOTES_v${{ steps.version.outputs.VER }}.md
          files: ClipFinder-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

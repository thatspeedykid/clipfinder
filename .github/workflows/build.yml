name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install NSIS
        run: choco install nsis --yes
        shell: cmd

      - name: Get version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update version in NSIS script
        run: |
          $ver = "${{ steps.version.outputs.VER }}"
          $nsi = Get-Content installer.nsi -Raw
          $nsi = $nsi -replace '!define APP_VER\s+"[^"]*"', "!define APP_VER `"$ver`""
          Set-Content installer.nsi $nsi
        shell: pwsh

      - name: Build installer
        run: build_installer.bat
        shell: cmd

      - name: Compile NSIS
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipFinder v${{ steps.version.outputs.VER }}
          body: |
            ## ClipFinder v${{ steps.version.outputs.VER }}

            ### Install
            Download `ClipFinder_Setup.exe` below and run it.
            - Installs to Program Files + Desktop shortcut
            - No Python required — everything included

            ### Updating from older version?
            Just run the new installer — your API keys and settings are preserved automatically.

            ### First time?
            After installing, go to **⚙ Settings → API Keys** and add a free Groq or Gemini key.

            ---
            Built by [@MarsScumbags](https://x.com/MarsScumbags)
          files: ClipFinder_Setup.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install NSIS
        run: choco install nsis --yes
        shell: cmd

      - name: Get version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update version in NSIS script
        run: |
          $ver = "${{ steps.version.outputs.VER }}"
          $nsi = Get-Content ClipFinder.nsi -Raw
          $nsi = $nsi -replace '!define APP_VERSION "\d+\.\d+(\.\d+)?"', "!define APP_VERSION `"$ver`""
          Set-Content ClipFinder.nsi $nsi
        shell: pwsh

      - name: Build installer
        run: build_installer.bat
        shell: cmd

      - name: Compile NSIS
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" ClipFinder.nsi
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipFinder v${{ steps.version.outputs.VER }}
          body_path: RELEASE_NOTES_v${{ steps.version.outputs.VER }}.md
          files: ClipFinder-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
